semantic_models:
  - name: orders
    description: >
      Semantic model for medical device order fulfillment.
      Grain: one row per sales order. Joins customer and facility context.
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: order_created_ts

    entities:
      - name: order
        type: primary
        expr: order_id
      - name: customer
        type: foreign
        expr: customer_account_id
      - name: facility
        type: foreign
        expr: facility_id

    dimensions:
      - name: order_id
        type: categorical
        expr: order_id
      - name: purchase_order_id
        type: categorical
        expr: purchase_order_id
      - name: status
        type: categorical
        expr: status
      - name: customer_name
        type: categorical
        expr: customer_name
      - name: facility_name
        type: categorical
        expr: facility_name
      - name: sales_region
        type: categorical
        expr: sales_region
      - name: carrier
        type: categorical
        expr: carrier
      - name: priority_flag
        type: categorical
        expr: priority_flag
      - name: account_type
        type: categorical
        expr: account_type
      - name: is_fulfilled
        type: categorical
        expr: is_fulfilled
      - name: facility_city
        type: categorical
        expr: facility_city
      - name: facility_state
        type: categorical
        expr: facility_state
      - name: order_created_ts
        type: time
        type_params:
          time_granularity: day
        expr: order_created_ts
      - name: status_last_updated_ts
        type: time
        type_params:
          time_granularity: day
        expr: status_last_updated_ts
      - name: promised_delivery_date
        type: time
        type_params:
          time_granularity: day
        expr: promised_delivery_date

    measures:
      - name: order_count
        description: Total number of orders
        agg: count
        expr: order_id
      - name: total_revenue
        description: Total order value in USD
        agg: sum
        expr: total_amount_usd
      - name: avg_order_value
        description: Average order value in USD
        agg: average
        expr: total_amount_usd
      - name: priority_order_count
        description: Number of priority-flagged orders
        agg: sum_boolean
        expr: priority_flag
      - name: fulfilled_order_count
        description: Number of shipped or delivered orders
        agg: sum_boolean
        expr: is_fulfilled
      - name: avg_days_to_update
        description: Average days from order creation to last status update
        agg: average
        expr: days_to_last_update

metrics:
  - name: order_count
    description: Total number of orders
    type: simple
    type_params:
      measure: order_count

  - name: revenue
    description: Total order revenue in USD
    type: simple
    type_params:
      measure: total_revenue

  - name: average_order_value
    description: Average order value in USD
    type: simple
    type_params:
      measure: avg_order_value

  - name: fulfilled_order_count
    description: Count of fulfilled (shipped/delivered) orders
    type: simple
    type_params:
      measure: fulfilled_order_count

  - name: priority_order_count
    description: Count of priority orders
    type: simple
    type_params:
      measure: priority_order_count

  - name: fulfillment_rate
    description: Percentage of orders that have been shipped or delivered
    type: derived
    type_params:
      expr: fulfilled_order_count * 1.0 / nullif(order_count, 0)
      metrics:
        - name: fulfilled_order_count
        - name: order_count

  - name: priority_rate
    description: Percentage of orders flagged as priority
    type: derived
    type_params:
      expr: priority_order_count * 1.0 / nullif(order_count, 0)
      metrics:
        - name: priority_order_count
        - name: order_count
