semantic_models:
  - name: order_items
    description: >
      Semantic model for order line items. Grain: one row per line item.
      Links to the orders semantic model via order_id.
    model: ref('stg_order_items')
    defaults:
      agg_time_dimension: created_at

    entities:
      - name: order_item
        type: primary
        expr: order_item_id
      - name: order
        type: foreign
        expr: order_id
      - name: product
        type: foreign
        expr: product_id

    dimensions:
      - name: order_item_id
        type: categorical
        expr: order_item_id
      - name: product_id
        type: categorical
        expr: product_id
      - name: created_at
        type: time
        type_params:
          time_granularity: day
        expr: created_at

    measures:
      - name: item_count
        description: Number of line items
        agg: count
        expr: order_item_id
      - name: total_quantity
        description: Total units across all line items
        agg: sum
        expr: quantity
      - name: total_line_revenue
        description: Total line-item revenue
        agg: sum
        expr: line_total_usd
      - name: avg_unit_price
        description: Average unit price across line items
        agg: average
        expr: unit_price_usd

metrics:
  - name: line_item_count
    description: Total number of order line items
    type: simple
    type_params:
      measure: item_count

  - name: units_ordered
    description: Total units ordered across all line items
    type: simple
    type_params:
      measure: total_quantity

  - name: line_item_revenue
    description: Total revenue from line items
    type: simple
    type_params:
      measure: total_line_revenue
