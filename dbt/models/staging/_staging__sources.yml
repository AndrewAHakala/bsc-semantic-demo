version: 2

sources:
  - name: demo_bsc_raw
    description: Raw synthetic BSC medical device fulfillment data loaded by generate_and_load.py
    database: "{{ var('database') }}"
    schema: "{{ var('schema') }}"

    tables:
      - name: CUSTOMER_DIM
        description: Customer accounts (hospitals, IDNs, clinics, GPOs, distributors)
        columns:
          - name: customer_account_id
            description: Primary key
            tests: [unique, not_null]

      - name: FACILITY_DIM
        description: Shipping/delivery facilities. Many-to-one with customers.
        columns:
          - name: facility_id
            description: Primary key
            tests: [unique, not_null]

      - name: PRODUCT_DIM
        description: Medical device product catalog
        columns:
          - name: product_id
            description: Primary key
            tests: [unique, not_null]

      - name: CONTACT_DIM
        description: Contact people at customer accounts/facilities
        columns:
          - name: contact_id
            description: Primary key
            tests: [unique, not_null]

      - name: ORDER_FACT
        description: Sales orders — 1 row per order
        columns:
          - name: order_id
            description: Primary key (format SO-YYYY-NNNNNN)
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  arguments:
                    values: ['CREATED', 'ALLOCATED', 'PICKED', 'SHIPPED', 'DELIVERED', 'BACKORDERED', 'CANCELLED', 'ON_HOLD']

      - name: ORDER_ITEM_FACT
        description: Line items for orders
        columns:
          - name: order_item_id
            description: Primary key
            tests: [unique, not_null]
