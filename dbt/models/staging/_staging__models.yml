version: 2

models:
  - name: stg_customers
    description: Cleaned customer dimension with normalized name field
    columns:
      - name: customer_account_id
        description: Primary key
        tests: [unique, not_null]
      - name: customer_name_norm
        description: Lowercased, ASCII-folded, punctuation-stripped customer name

  - name: stg_facilities
    description: Cleaned facility dimension with normalized name field
    columns:
      - name: facility_id
        description: Primary key
        tests: [unique, not_null]
      - name: facility_name_norm
        description: Lowercased, ASCII-folded, punctuation-stripped facility name

  - name: stg_products
    description: Cleaned product catalog
    columns:
      - name: product_id
        description: Primary key
        tests: [unique, not_null]

  - name: stg_contacts
    description: Cleaned contacts with normalized name
    columns:
      - name: contact_id
        description: Primary key
        tests: [unique, not_null]

  - name: stg_orders
    description: Cleaned order fact with derived fulfillment flags
    columns:
      - name: order_id
        description: Primary key (format SO-YYYY-NNNNNN)
        tests: [unique, not_null]
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['CREATED', 'ALLOCATED', 'PICKED', 'SHIPPED', 'DELIVERED', 'BACKORDERED', 'CANCELLED', 'ON_HOLD']

  - name: stg_order_items
    description: Cleaned order line items
    columns:
      - name: order_item_id
        description: Primary key
        tests: [unique, not_null]
