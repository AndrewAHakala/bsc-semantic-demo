version: 2

models:
  - name: fct_orders
    description: >
      Denormalized order fact table joining orders with customer and facility
      dimensions. This is the canonical order entity used across the platform.
    columns:
      - name: order_id
        description: Primary key (format SO-YYYY-NNNNNN)
        tests: [unique, not_null]
      - name: status
        description: Current order fulfillment status
        tests:
          - accepted_values:
              arguments:
                values: ['CREATED', 'ALLOCATED', 'PICKED', 'SHIPPED', 'DELIVERED', 'BACKORDERED', 'CANCELLED', 'ON_HOLD']
      - name: customer_account_id
        tests: [not_null]
      - name: facility_id
        tests: [not_null]

  - name: order_search_v
    description: >
      Search-optimized view over fct_orders with normalized text fields
      and a concatenated search_blob. This is the primary query target
      for the Order Status Assistant API candidate retrieval.
    columns:
      - name: order_id
        description: Primary key
        tests: [unique, not_null]
      - name: search_blob
        description: Concatenated lowercased text for fallback token matching
